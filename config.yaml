discussion_rounds: 4
max_review_iterations: 3
claude_model: "opus"
claude_effort: "medium"
codex_model: "gpt-5.5"
codex_reasoning_effort: "medium"
kiro_model: "haiku"
dev_model: "sonnet"
dev_effort: "medium"
timeout_seconds: 600
codex_timeout_seconds: 300
auto_commit: false
working_directory: "."

# Research phase settings
research_wall_seconds: ~  # no time limit; agents run until they finish

# Optimization settings
repo_map_max_tokens: 2000
discussion_summary_window: 4  # keep last N history entries verbatim
file_by_file_generation: true  # use per-file generation when structured plan available

# Task complexity tiers (selected at task start or via --tier)
#   quick:    Sonnet dev, 1 review round, 1 discussion round
#   standard: Sonnet dev, 2 review rounds, 2 discussion rounds (default)
#   complex:  Opus dev, 3 review rounds, 4 discussion rounds
tiers:
  quick:
    dev_model: "sonnet"
    max_review_iterations: 1
    discussion_rounds: 1
  standard:
    dev_model: "sonnet"
    max_review_iterations: 2
    discussion_rounds: 2
  complex:
    dev_model: "sonnet"
    max_review_iterations: 3
    discussion_rounds: 4
